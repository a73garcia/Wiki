<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ title }} - Wiki Local</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<header class="topbar">

    <div class="logo">
        Wiki Local
    </div>

    <div class="search">

        <form action="/search" method="get">

            <input
                type="text"
                name="q"
                placeholder="Buscar..."
                autocomplete="off">

            <button type="submit">
                Buscar
            </button>

        </form>

    </div>

</header>

<div class="container">

    <aside class="sidebar">

        <ul>

            <li><a href="/">Inicio</a></li>

            <li><a href="/pages">Páginas</a></li>

            <li><a href="/categories">Categorías</a></li>

            <li><a href="/attachments">Adjuntos</a></li>

            <li><a href="/history">Historial</a></li>

            <li><a href="/favorites">Favoritos</a></li>

            <li><a href="/settings">Configuración</a></li>

        </ul>

    </aside>

    <main class="content">

        {{ content }}

    </main>

</div>

<footer>

Wiki Local © 2026

</footer>

</body>

</html>
