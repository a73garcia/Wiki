<article class="wiki-page">

<header class="page-header">

<h1>{{ title }}</h1>

<div class="page-meta">

<span><strong>Categoría:</strong> {{ category }}</span>

<span><strong>Última modificación:</strong> {{ modified }}</span>

<span><strong>Autor:</strong> {{ author }}</span>

</div>

</header>

<nav class="toc">

<h2>Índice</h2>

{{ toc }}

</nav>

<section class="page-content">

{{ content }}

</section>

<hr>

<section class="attachments">

<h2>Adjuntos</h2>

{{ attachments }}

</section>

<hr>

<section class="related">

<h2>Artículos relacionados</h2>

<ul>

{{ related_pages }}

</ul>

</section>

<hr>

<section class="page-actions">

<a class="button" href="/page/edit/{{ slug }}">
✏ Editar
</a>

<a class="button" href="/history/{{ slug }}">
🕒 Historial
</a>

<a class="button" href="/export/pdf/{{ slug }}">
📄 Exportar PDF
</a>

<a class="button" href="/favorite/{{ slug }}">
⭐ Favorito
</a>

</section>

</article>
