<h1>Búsqueda</h1>

<form action="/search" method="get" class="search-form">

    <input
        type="text"
        name="q"
        value="{{ query }}"
        placeholder="Buscar páginas, categorías o contenido..."
        autofocus>

    <button type="submit">
        Buscar
    </button>

</form>

<hr>

<p>
Se han encontrado <strong>{{ total_results }}</strong> resultados.
</p>

<div class="search-results">

{{ results }}

-->

</div>

<hr>

<div class="search-help">

<h2>Consejos de búsqueda</h2>

<ul>
<li>Buscar por título.</li>
<li>Buscar por contenido.</li>
<li>Buscar por categoría.</li>
<li>Buscar por etiquetas.</li>
<li>Buscar fragmentos de código.</li>
</ul>

</div>
