<h1>{{ page_title }}</h1>

<form action="/page/save" method="post">

<div class="editor-layout">

    <div class="editor-main">

        <label>Título</label>

        <input
            type="text"
            name="title"
            value="{{ title }}"
            class="input-title"
            required>

        <label>Categoría</label>

        <input
            type="text"
            name="category"
            value="{{ category }}"
            placeholder="Ej.: Splunk, Python, Cisco CES">

        <label>Etiquetas</label>

        <input
            type="text"
            name="tags"
            value="{{ tags }}"
            placeholder="Separadas por comas">

        <label>Contenido (Markdown)</label>

        <textarea
            id="editor"
            name="content"
            spellcheck="false">{{ content }}</textarea>

    </div>

    <aside class="editor-sidebar">

        <h3>Acciones</h3>

        <button type="submit" class="button">
            💾 Guardar
        </button>

        <a href="/preview" class="button">
            👁 Vista previa
        </a>

        <a href="/history" class="button">
            🕒 Historial
        </a>

        <a href="/attachments" class="button">
            📎 Adjuntos
        </a>

        <hr>

        <h3>Ayuda Markdown</h3>

<pre>
# Título
## Subtítulo

**Negrita**
*Cursiva*

- Lista

```python
print("Hola")
```

[Enlace](https://...)

</pre>

    </aside>

</div>

</form>
